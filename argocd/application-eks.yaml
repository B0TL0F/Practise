apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: practise-eks
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/CHANGE_ME/Practise.git
    targetRevision: main
    path: k8s/overlays/eks
  destination:
    server: https://kubernetes.default.svc
    namespace: practise
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
