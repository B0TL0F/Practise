apiVersion: apps/v1
kind: Deployment
metadata:
  name: api
  namespace: practise
spec:
  replicas: 1
  selector:
    matchLabels:
      app: api
  template:
    metadata:
      labels:
        app: api
    spec:
      containers:
        - name: api
          image: ghcr.io/b0tl0f/practise-api:latest
          ports:
            - containerPort: 3000
          env:
            - name: PGHOST
              value: postgres
            - name: PGPORT
              value: "5432"
          envFrom:
            - secretRef:
                name: postgres-credentials
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 250m
              memory: 256Mi
          readinessProbe:
            httpGet:
              path: /api/health
              port: 3000
            initialDelaySeconds: 3
---
apiVersion: v1
kind: Service
metadata:
  name: api
  namespace: practise
spec:
  selector:
    app: api
  ports:
    - port: 3000
      targetPort: 3000
